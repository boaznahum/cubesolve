<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boaz NxN Rubik Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app-layout">
        <!-- History Panel -->
        <div id="history-panel">
            <div class="hp-header">
                <span class="hp-title">History</span>
                <button class="hp-header-btn" id="btn-history-clear" title="Clear history">&#x2715;</button>
            </div>
            <div id="history-list"></div>
            <div class="hp-footer">
                <button class="hp-action-btn" id="btn-fastrewind" title="Undo all" disabled>
                    <span class="icon">&#x25C0;&#x25C0;</span>
                </button>
                <button class="hp-action-btn" id="btn-undo" title="Undo" disabled>
                    <span class="icon">&#x25C0;</span>
                </button>
                <button class="hp-action-btn" id="btn-redo" title="Redo" disabled>
                    <span class="icon">&#x25B6;</span>
                </button>
                <button class="hp-action-btn hp-btn-play" id="btn-fastplay" title="Play all" disabled>
                    <span class="icon">&#x25B6;&#x25B6;</span>
                </button>
            </div>
        </div>
        <!-- Cube area -->
        <div id="container">
            <div id="toolbar">
                <div class="tb-group">
                    <button class="tb-btn" data-cmd="scramble">Scramble</button>
                    <button class="tb-btn" data-cmd="solve_and_play">Solve</button>
                    <button class="tb-btn" data-cmd="solve">Solution</button>
                    <button class="tb-btn" id="btn-stop" data-cmd="stop" disabled>Stop</button>
                    <button class="tb-btn" data-cmd="reset">Reset</button>
                    <button class="tb-btn tb-icon" data-cmd="reset_session"
                        title="Reset session — start completely fresh">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"
                                fill="#ccc" />
                        </svg>
                    </button>
                    <button class="tb-btn tb-compass" id="btn-view-reset" title="Reset view to default camera position">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="9.5" stroke="#4dd" stroke-width="1.8" />
                            <line x1="12" y1="1" x2="12" y2="5.5" stroke="#4dd" stroke-width="1.5" />
                            <line x1="12" y1="18.5" x2="12" y2="23" stroke="#4dd" stroke-width="1.5" />
                            <line x1="1" y1="12" x2="5.5" y2="12" stroke="#4dd" stroke-width="1.5" />
                            <line x1="18.5" y1="12" x2="23" y2="12" stroke="#4dd" stroke-width="1.5" />
                            <polygon points="12,5 9.5,13 12,11.5 14.5,13" fill="#e33" />
                            <polygon points="12,19 9.5,13 12,14.5 14.5,13" fill="#fff" opacity="0.7" />
                            <text x="12" y="3.5" text-anchor="middle" fill="#e33" font-size="4"
                                font-weight="bold">N</text>
                        </svg>
                    </button>
                </div>
                <div class="tb-sep"></div>
                <div class="tb-group">
                    <button class="tb-btn tb-on" id="btn-debug" data-cmd="toggle_debug">Dbg:ON</button>
                    <button class="tb-btn tb-on" id="btn-anim" data-cmd="toggle_animation">Anim:ON</button>
                    <label class="tb-label" style="cursor:pointer"><input type="checkbox" id="chk-assist" checked>
                        Assist</label>
                    <button class="tb-btn tb-on" id="btn-sound" title="Toggle sound effects">🔊</button>
                </div>
                <div class="tb-sep"></div>
                <div class="tb-group">
                    <span class="tb-label">Solver</span>
                    <select id="solver-select" title="Solver"></select>
                </div>
                <div class="tb-sep"></div>
                <div class="tb-group">
                    <span class="tb-label">Size</span>
                    <select id="size-select" title="Cube size"></select>
                </div>
                <div class="tb-sep"></div>
                <div class="tb-group">
                    <span class="tb-label">Spd</span>
                    <select id="speed-select" title="Animation speed"></select>
                </div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="canvas"></canvas>
                <div id="anim-overlay"></div>
                <div id="status-overlay"></div>
                <div id="debug-overlay"></div>
            </div>
            <div id="status"><span class="status-dot"></span>Connecting...</div>
        </div>
    </div><!-- /app-layout -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
