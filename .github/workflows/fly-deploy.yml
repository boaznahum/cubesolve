name: Fly Deploy
on:
  push:
    branches:
      - main
      - webgl-dev
      - staging

jobs:
  deploy-prod:
    name: Deploy Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        run: |
          VERSION=$(cat src/cube/resources/version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "::notice::Deploying v$VERSION to production (cubesolve)"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          echo "Deploying v$VERSION to cubesolve (production)"
          flyctl deploy --remote-only --app cubesolve
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: echo "✅ v$VERSION deployed to production"

  deploy-dev:
    name: Deploy Dev
    if: github.ref == 'refs/heads/webgl-dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        run: |
          VERSION=$(cat src/cube/resources/version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "::notice::Deploying v$VERSION to dev (cubesolve-dev)"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          echo "Deploying v$VERSION to cubesolve-dev"
          flyctl deploy --remote-only --app cubesolve-dev
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
      - run: echo "✅ v$VERSION deployed to dev"

  deploy-staging:
    name: Deploy Staging
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        run: |
          VERSION=$(cat src/cube/resources/version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "::notice::Deploying v$VERSION to staging (cubesolve-staging)"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          echo "Deploying v$VERSION to cubesolve-staging"
          flyctl deploy --remote-only --app cubesolve-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: echo "✅ v$VERSION deployed to staging"
